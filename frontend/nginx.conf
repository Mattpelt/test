server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # index.html : jamais mis en cache (force le rechargement après déploiement)
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri /index.html;
    }

    # Assets JS/CSS/images : cache long (Vite génère un hash dans le nom de fichier)
    location ~* \.(js|css|woff2?|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # React Router — toutes les autres URLs servent index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API → backend (le /api/ est retiré de l'URL avant transmission)
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        # Timeout augmenté pour les uploads de PDF
        proxy_read_timeout 120s;
    }

    # X-Accel-Redirect — nginx sert les fichiers vidéo directement
    # Le backend retourne X-Accel-Redirect: /protected-videos/<chemin>
    # nginx résout /protected-videos/ → /mnt/videos/ (volume monté)
    location /protected-videos/ {
        internal;
        alias /mnt/videos/;
    }
}

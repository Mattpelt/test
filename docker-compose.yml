services:

  db:
    image: postgres:15
    restart: always
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: always
    env_file: .env
    privileged: true                        # nécessaire pour la détection USB (pyudev)
    volumes:
      - ./backend:/app                           # rechargement du code sans rebuild
      - ${VIDEO_STORAGE_PATH}:/mnt/videos        # HDD(s) SATA pour les vidéos
      - /dev:/dev                                # accès complet aux périphériques USB (MTP + Mass Storage)
      - /media:/media                            # points de montage udisks2 (Mass Storage — Insta360, cartes SD)
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy          # attend que PostgreSQL soit prêt

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "80:80"
    volumes:
      - ${VIDEO_STORAGE_PATH}:/mnt/videos:ro   # vidéos en lecture seule (X-Accel-Redirect)
    depends_on:
      - backend

  n8n:
    image: n8nio/n8n
    restart: always
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/workflows:/n8n-workflows   # workflows versionnés dans le repo
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - N8N_SECURE_COOKIE=false
      - N8N_EDITOR_BASE_URL=http://192.168.1.39:5678
      - WEBHOOK_URL=http://192.168.1.39:5678

volumes:
  postgres_data:
  n8n_data:

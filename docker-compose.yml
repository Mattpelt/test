services:

  db:
    image: postgres:15
    restart: always
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    restart: always
    env_file: .env
    privileged: true                        # nécessaire pour la détection USB (pyudev)
    volumes:
      - ./backend:/app                      # rechargement du code sans rebuild
      - ${VIDEO_STORAGE_PATH}:/mnt/videos   # HDD(s) SATA pour les vidéos
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data:
